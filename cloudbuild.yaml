steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/my-fastapi-repo/fastapi-app:latest'
      - '.'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/my-fastapi-repo/fastapi-app:latest'

  # Step 3: Deploy the pushed image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fastapi-app'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/my-fastapi-repo/fastapi-app:latest'
      - '--region=asia-south1'
      - '--allow-unauthenticated'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/my-fastapi-repo/fastapi-app:latest'
