steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/my-fastapi-repo/fastapi-app:latest'
      - '.'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/my-fastapi-repo/fastapi-app:latest'

  # Step 3: Deploy the image to Cloud Run (Explicitly targeting port 8080)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fastapi-app'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/my-fastapi-repo/fastapi-app:latest'
      - '--region=asia-south1'
      - '--port=8080'
      - '--allow-unauthenticated'

  # Step 4: Force public IAM visibility to fix the warning
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'services'
      - 'add-iam-policy-binding'
      - 'fastapi-app'
      - '--region=asia-south1'
      - '--member=allUsers'
      - '--role=roles/run.invoker'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/my-fastapi-repo/fastapi-app:latest'
